<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4820A"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Cat ears -->
  <polygon points="20,30 30,5 42,28" fill="#E89010"/>
  <polygon points="58,28 70,5 80,30" fill="#E89010"/>
  <polygon points="24,28 30,12 38,27" fill="#FFD4A8"/>
  <polygon points="62,27 70,12 76,28" fill="#FFD4A8"/>
  <!-- Face -->
  <ellipse cx="50" cy="52" rx="30" ry="28" fill="#FFD4A8"/>
  <!-- Eyes -->
  <ellipse cx="38" cy="44" rx="6" ry="7" fill="white"/>
  <ellipse cx="62" cy="44" rx="6" ry="7" fill="white"/>
  <circle cx="38" cy="44" r="4" fill="#1a1a1a"/>
  <circle cx="62" cy="44" r="4" fill="#1a1a1a"/>
  <circle cx="39.5" cy="42.5" r="1.5" fill="white"/>
  <circle cx="63.5" cy="42.5" r="1.5" fill="white"/>
  <!-- Open mouth (signature popcat O) -->
  <ellipse cx="50" cy="64" rx="12" ry="14" fill="#D44" stroke="#222" stroke-width="1.5"/>
  <ellipse cx="50" cy="62" rx="8" ry="6" fill="#1a1a1a"/>
  <!-- Nose -->
  <ellipse cx="50" cy="54" rx="3" ry="2" fill="#E07"/>
  <!-- Whiskers -->
  <line x1="15" y1="50" x2="34" y2="52" stroke="#C88" stroke-width="1.2"/>
  <line x1="15" y1="56" x2="34" y2="56" stroke="#C88" stroke-width="1.2"/>
  <line x1="66" y1="52" x2="85" y2="50" stroke="#C88" stroke-width="1.2"/>
  <line x1="66" y1="56" x2="85" y2="56" stroke="#C88" stroke-width="1.2"/>
</svg>
